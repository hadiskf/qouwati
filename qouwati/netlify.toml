[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# ── API Routes ───────────────────────────────────────────────
[[redirects]]
  from = "/api/posts"
  to   = "/.netlify/functions/posts"
  status = 200

[[redirects]]
  from = "/api/tips"
  to   = "/.netlify/functions/tips"
  status = 200

[[redirects]]
  from = "/api/faqs"
  to   = "/.netlify/functions/faqs"
  status = 200

[[redirects]]
  from = "/api/testimonials"
  to   = "/.netlify/functions/testimonials"
  status = 200

[[redirects]]
  from = "/api/comments"
  to   = "/.netlify/functions/comments"
  status = 200

[[redirects]]
  from = "/api/reactions"
  to   = "/.netlify/functions/reactions"
  status = 200

[[redirects]]
  from = "/api/newsletter"
  to   = "/.netlify/functions/newsletter"
  status = 200

[[redirects]]
  from = "/api/analytics"
  to   = "/.netlify/functions/analytics"
  status = 200

[[redirects]]
  from = "/sitemap.xml"
  to   = "/.netlify/functions/sitemap"
  status = 200

# ── SPA fallback ─────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200

# ── Security Headers ─────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
